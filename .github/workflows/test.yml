name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: "pytest (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v4

      # PySide6 pulls many .so at import (EGL/GL/XCB, fontconfig, glib, etc.); runner image
      # may omit them until explicitly installed.
      - name: Install Qt / EGL runtime (PySide6 headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-3 \
            libegl1 \
            libfontconfig1 \
            libfreetype6 \
            libglib2.0-0 \
            libgl1 \
            libxcb-cursor0 \
            libxkbcommon0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install test tools
        run: python -m pip install pytest pytest-cov flake8

      - name: Install application dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=pypost \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junit-xml=junit.xml

      - name: Write job summary
        if: always()
        run: |
          echo "## Test Results — Python ${{ matrix.python-version }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -f junit.xml ]; then
            TOTAL=$(grep -oP 'tests="\K[0-9]+' junit.xml | head -1 || echo "?")
            FAILURES=$(grep -oP 'failures="\K[0-9]+' junit.xml | head -1 || echo "?")
            ERRORS=$(grep -oP 'errors="\K[0-9]+' junit.xml | head -1 || echo "?")
            SKIPPED=$(grep -oP 'skipped="\K[0-9]+' junit.xml | head -1 || echo "?")
            echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Total | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Failures | $FAILURES |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Errors | $ERRORS |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Skipped | $SKIPPED |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_junit.xml not found — pytest may have failed before producing output._" \
              >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Coverage — Python ${{ matrix.python-version }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -f coverage.xml ]; then
            COV=$(python -c \
              "import xml.etree.ElementTree as ET; \
               r = ET.parse('coverage.xml').getroot().get('line-rate','0'); \
               print(f'{float(r)*100:.1f}')")
            THRESHOLD=50
            if python -c "exit(0 if float('$COV') >= $THRESHOLD else 1)"; then
              STATUS=":white_check_mark: PASS"
            else
              STATUS=":x: FAIL (below ${THRESHOLD}% threshold)"
            fi
            echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Line coverage | ${COV}% |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Threshold (--cov-fail-under) | ${THRESHOLD}% |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Status | ${STATUS} |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_coverage.xml not found — coverage report unavailable._" \
              >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: junit.xml
          if-no-files-found: warn

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn
